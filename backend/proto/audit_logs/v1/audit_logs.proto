syntax = "proto3";

package audit_logs.v1;

option go_package = "github.com/AlessandroRLM/infraestructura-y-servicios-cloud/backend/gen/audit_logs/v1;auditlogsv1";

// AuditLogsService exposes a single read RPC for querying the append-only audit log.
// Scoped by entity+entity_id (always required). Requires audit.read permission.
service AuditLogsService {
  // ListAuditLogs returns a paginated, newest-first list of audit log entries for
  // a given entity instance. Requires audit.read permission.
  rpc ListAuditLogs(ListAuditLogsRequest) returns (ListAuditLogsResponse);
}

// AuditLog is a single entry in the append-only audit log.
message AuditLog {
  // id is the UUIDv7 primary key (also used as the pagination cursor).
  string id = 1;
  // actor_id is the UUID of the user who performed the action; empty when the
  // action was system-originated (actor_id IS NULL in the database).
  string actor_id = 2;
  // action is the event code, e.g. "grade.update".
  string action = 3;
  // entity is the logical resource type, e.g. "grades".
  string entity = 4;
  // entity_id is the UUID of the affected resource instance.
  string entity_id = 5;
  // detail is the raw JSON payload; empty when the database column is NULL.
  string detail = 6;
  // created_at is the event timestamp in RFC3339 / ISO-8601 format.
  string created_at = 7;
}

// ListAuditLogsRequest is the request message for ListAuditLogs.
message ListAuditLogsRequest {
  // entity is required — the logical resource type (e.g. "grades").
  string entity = 1;
  // entity_id is required — the UUID string of the resource instance.
  string entity_id = 2;
  // actor_id is an optional UUID string filter. When provided, only rows whose
  // actor_id matches are returned. Absent = no actor filter (includes system rows).
  string actor_id = 3;
  // created_from is an optional RFC3339 timestamp lower bound (inclusive).
  string created_from = 4;
  // created_to is an optional RFC3339 timestamp upper bound (inclusive).
  string created_to = 5;
  // page_size controls how many rows to return. Values <= 0 are clamped to 20;
  // values > 200 are clamped to 200. No CodeInvalidArgument is returned for
  // out-of-range values.
  int32 page_size = 6;
  // page_token is the opaque continuation cursor returned by a previous call.
  // Empty string or absent means "start from the beginning" (newest row first).
  string page_token = 7;
}

// ListAuditLogsResponse is the response message for ListAuditLogs.
message ListAuditLogsResponse {
  // logs contains the matching audit log entries, ordered newest-first (DESC by id).
  repeated AuditLog logs = 1;
  // next_page_token is the continuation cursor for the next page. An empty string
  // signals that no further pages exist (AIP-158 convention). Clients must treat
  // this value as opaque and never parse or construct it.
  string next_page_token = 2;
  // Field number 3 is reserved for has_more if it is ever re-added.
  reserved 3;
}
