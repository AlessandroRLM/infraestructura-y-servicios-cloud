syntax = "proto3";

package reports.v1;

option go_package = "github.com/AlessandroRLM/infraestructura-y-servicios-cloud/backend/gen/reports/v1;reportsv1";

// ReportsService exposes four authorized, Redis-cached read RPCs for administrative
// and teacher-scoped reporting over the academic data model.
service ReportsService {
  // GetSectionGradeReport returns the grade report for a section.
  // Admin: unscoped. Teacher: scoped to own sections (section_teachers membership).
  // Requires reports.read.
  rpc GetSectionGradeReport(GetSectionGradeReportRequest) returns (GetSectionGradeReportResponse);

  // GetSectionOccupancyReport returns capacity vs. active enrollment counts per section
  // for an academic period. Admin-only at service layer; teacher receives CodePermissionDenied.
  // Requires reports.read.
  rpc GetSectionOccupancyReport(GetSectionOccupancyReportRequest) returns (GetSectionOccupancyReportResponse);

  // GetProgramSummaryReport returns quota and enrollment counts for a program/year.
  // Admin-only at service layer; teacher receives CodePermissionDenied.
  // Requires reports.read.
  rpc GetProgramSummaryReport(GetProgramSummaryReportRequest) returns (GetProgramSummaryReportResponse);

  // GetStudentRecordReport returns the full cross-period academic record for a student.
  // Admin-only at service layer; teacher receives CodePermissionDenied.
  // Requires reports.read.
  rpc GetStudentRecordReport(GetStudentRecordReportRequest) returns (GetStudentRecordReportResponse);
}

// PartialGrade holds a single evaluation's grade value for a student.
message PartialGrade {
  string evaluation_id = 1;
  // position is the 1-based position of this evaluation in the course scheme.
  int32 position = 2;
  // value is a decimal string (e.g. "5.5"); absent if no grade was recorded.
  string value = 3;
}

// StudentGradeRow holds the full grade information for a single student in a section.
message StudentGradeRow {
  string student_id = 1;
  string given_names = 2;
  string last_name_paternal = 3;
  string last_name_maternal = 4;
  // partial_grades lists one entry per evaluation, ordered by position ASC.
  // Empty when no evaluation scheme is defined for the section.
  repeated PartialGrade partial_grades = 5;
  // final_grade is a decimal string; absent if not yet computed.
  string final_grade = 6;
  // outcome is one of "passed", "failed", or "in_progress".
  string outcome = 7;
}

// SectionOccupancyRow holds capacity and active enrollment counts for a single section.
message SectionOccupancyRow {
  string section_id = 1;
  reserved 2;
  reserved "section_name";
  string course_name = 3;
  int32 capacity = 4;
  int32 active_seat_count = 5;
  // fill_percentage is a decimal string (e.g. "66.7"); "0.0" when capacity is zero.
  string fill_percentage = 6;
}

// ProgramEnrollmentRow holds quota and enrollment counts for a program/year.
message ProgramEnrollmentRow {
  string quota_id = 1;
  int32 quota_capacity = 2;
  int32 enrolled_count = 3;
  // available_seats is clamped to 0 when enrolled_count exceeds quota_capacity.
  int32 available_seats = 4;
  // fill_percentage is a decimal string.
  string fill_percentage = 5;
}

// AcademicRecordRow holds a single section enrollment entry in a student's academic record.
message AcademicRecordRow {
  string academic_period_id = 1;
  string academic_period_name = 2;
  string section_id = 3;
  reserved 4;
  reserved "section_name";
  string course_name = 5;
  // enrollment_status is the section_enrollment status: in_progress, passed, failed, withdrawn.
  string enrollment_status = 6;
  // final_grade is a decimal string; absent if not yet computed.
  string final_grade = 7;
  // outcome is one of "passed", "failed", or "in_progress".
  string outcome = 8;
}

message GetSectionGradeReportRequest {
  string section_id = 1;
}

message GetSectionGradeReportResponse {
  string section_id = 1;
  repeated StudentGradeRow rows = 2;
  // generated_at is an ISO-8601 timestamp reflecting when the cache entry was first populated.
  string generated_at = 3;
  // truncated is true when the result set was capped at 500 rows.
  bool truncated = 4;
}

message GetSectionOccupancyReportRequest {
  string academic_period_id = 1;
}

message GetSectionOccupancyReportResponse {
  string academic_period_id = 1;
  repeated SectionOccupancyRow rows = 2;
  string generated_at = 3;
  // truncated is true when the result set was capped at 1000 rows.
  bool truncated = 4;
  // academic_period_name is the human-readable label for the period (e.g. "2025-1").
  string academic_period_name = 5;
}

message GetProgramSummaryReportRequest {
  string program_id = 1;
  // year is the 4-digit academic year (e.g. 2025). Must be in [2000, 2100].
  int32 year = 2;
}

message GetProgramSummaryReportResponse {
  string program_id = 1;
  string program_name = 2;
  int32 year = 3;
  repeated ProgramEnrollmentRow rows = 4;
  string generated_at = 5;
  // truncated is true when the result set was capped at 200 rows.
  bool truncated = 6;
}

message GetStudentRecordReportRequest {
  string student_id = 1;
}

message GetStudentRecordReportResponse {
  string student_id = 1;
  string student_name = 2;
  repeated AcademicRecordRow rows = 3;
  string generated_at = 4;
  // truncated is true when the result set was capped at 1000 rows.
  bool truncated = 5;
}
