version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/platform/db/query.sql"
    schema: "migrations/"
    gen:
      go:
        package: "db"
        out: "internal/platform/db"
        sql_package: "pgx/v5"
        emit_interface: true
  - engine: "postgresql"
    queries: "internal/auth/query.sql"
    schema: "migrations/"
    gen:
      go:
        package: "authdb"
        out: "internal/auth/authdb"
        sql_package: "pgx/v5"
        emit_interface: true
  - engine: "postgresql"
    queries: "internal/rbac/query.sql"
    schema: "migrations/"
    gen:
      go:
        package: "rbacdb"
        out: "internal/rbac/rbacdb"
        sql_package: "pgx/v5"
        emit_interface: true
  - engine: "postgresql"
    queries: "internal/profiles/query.sql"
    schema: "migrations/"
    gen:
      go:
        package: "profilesdb"
        out: "internal/profiles/profilesdb"
        sql_package: "pgx/v5"
        emit_interface: true
  - engine: "postgresql"
    queries: "internal/catalog/query.sql"
    schema: "migrations/"
    gen:
      go:
        package: "catalogdb"
        out: "internal/catalog/catalogdb"
        sql_package: "pgx/v5"
        emit_interface: true
