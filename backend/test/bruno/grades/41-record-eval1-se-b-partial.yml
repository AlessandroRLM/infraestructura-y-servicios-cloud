info:
  name: 41 Record Grade Eval1 SE-B Partial Grading
  type: http
  seq: 41

http:
  method: POST
  url: "{{host}}/grades.v1.GradesService/RecordGrade"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{teacher_sid}}"
  body:
    type: json
    data: |-
      {
        "evaluationId": "{{gr_eval1_id}}",
        "sectionEnrollmentId": "{{gr_se_b_id}}",
        "value": "6.0"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.grade.version
      operator: eq
      value: "1"

docs: |
  Recording block — teacher records only eval1 for SE-B (partial grading).
  eval2 and eval3 remain ungraded → SE-B must stay in_progress.
  Mirrors: TestGradesOutcome_PartialGrading (AS-11).
