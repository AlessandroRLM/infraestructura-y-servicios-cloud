info:
  name: 13 Setup Create Enrollment Student A
  type: http
  seq: 13

http:
  method: POST
  url: "{{host}}/enrollment.v1.EnrollmentService/CreateEnrollment"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "studentId": "{{student_a_id}}",
        "programId": "{{grades_prog_id}}",
        "year": 2026
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("grades_enroll_a_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.id
      operator: neq
      value: ""

docs: |
  Grades setup — creates a pending annual enrollment for student A (year=2026).
  student_a_id and grades_prog_id must both be set before this step.
  Captures grades_enroll_a_id.
