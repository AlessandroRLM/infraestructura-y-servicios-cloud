info:
  name: 24 Setup Teacher Confirm Reset
  type: http
  seq: 24

http:
  method: POST
  url: "{{host}}/auth.v1.AuthService/ConfirmPasswordReset"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "token": "{{teacher_reset_token}}",
        "newPassword": "TeacherGRSmoke123!"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Teacher login_with_reset — step 2: confirm password reset.
