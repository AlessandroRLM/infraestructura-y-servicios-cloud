info:
  name: 11 Setup Create Section2
  type: http
  seq: 11

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/CreateSection"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "courseId": "{{gr_course1_id}}",
        "academicPeriodId": "{{open_period_id}}",
        "seatCapacity": 30
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("gr_section2_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.id
      operator: neq
      value: ""

docs: |
  Grades setup — creates section2 (also on course1) with NO teacher assigned.
  Used for the out-of-scope denial test: teacher cannot record grades for a section
  they are not assigned to.
  Captures gr_section2_id.
  Mirrors: TestGradesRecord_NotSectionTeacher scenario.
