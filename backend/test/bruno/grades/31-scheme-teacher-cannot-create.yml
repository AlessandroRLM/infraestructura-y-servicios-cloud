info:
  name: 31 Scheme Teacher Cannot Create Scheme
  type: http
  seq: 31

http:
  method: POST
  url: "{{host}}/grades.v1.GradesService/CreateEvaluationScheme"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{teacher_sid}}"
  body:
    type: json
    data: |-
      {
        "courseId": "{{gr_course2_id}}",
        "evaluations": [
          {"weight": "1.000"}
        ]
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.body.code
      operator: eq
      value: "permission_denied"

docs: |
  Scheme block — teacher (grades.write only, no grades.override) attempts to create a scheme
  on course2 → permission_denied.
  Mirrors: TestGradesScheme_TeacherCannotCreate (AS-21).
