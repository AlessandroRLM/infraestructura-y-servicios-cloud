info:
  name: 25 Happy Path List Own Grades Student A
  type: http
  seq: 25

http:
  method: POST
  url: "{{host}}/grades.v1.GradesService/ListOwnGrades"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{grades_student_a_sid}}"
  body:
    type: json
    data: |-
      {}

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: (res.body.grades ?? []).some(g => g.sectionEnrollmentId === bru.getVar("grades_se_a_id") && g.value !== "")
      operator: eq
      value: "true"

docs: |
  Happy path: student A reads their own grades via ListOwnGrades.
  The OwnGrade message intentionally omits gradedBy (privacy).
  Asserts a grade for grades_se_a_id is present with a non-empty value.
  Membership (.some) instead of grades[0]: other folders in a full
  collection run also grade the shared seeded student A, so response
  order is not guaranteed.
  Requires grades.view_own permission.
