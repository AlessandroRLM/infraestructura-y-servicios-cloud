info:
  name: 22 Setup Admin EnrollSection A Into Section2
  type: http
  seq: 22

http:
  method: POST
  url: "{{host}}/section_enrollment.v1.SectionEnrollmentService/EnrollSection"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "enrollmentId": "{{gr_enroll_a_id}}",
        "sectionId": "{{gr_section2_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("gr_se_a2_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Grades setup — admin enrolls student A into section2 (teacher NOT assigned there).
  gr_se_a2_id used in the out-of-scope teacher denial test.
