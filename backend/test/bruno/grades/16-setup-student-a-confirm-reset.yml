info:
  name: 16 Setup Student A Confirm Reset
  type: http
  seq: 16

http:
  method: POST
  url: "{{host}}/auth.v1.AuthService/ConfirmPasswordReset"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "token": "{{student_a_reset_token}}",
        "newPassword": "StudentAGrades123!"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: before-request
      code: |-
        bru.setVar("student_a_password", "StudentAGrades123!");
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Grades setup — step 2 of student A login chain: confirm password reset.
