info:
  name: 43 Record Correct Eval2 SE-A To 1.0 Boundary Passed
  type: http
  seq: 43

http:
  method: POST
  url: "{{host}}/grades.v1.GradesService/RecordGrade"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{teacher_sid}}"
  body:
    type: json
    data: |-
      {
        "evaluationId": "{{gr_eval2_id}}",
        "sectionEnrollmentId": "{{gr_se_a_id}}",
        "value": "1.0",
        "expectedVersion": 1
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: tests
      code: |-
        test("grade value is the exact decimal string", function() {
          expect(res.body.grade.value).to.equal("1.0");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.grade.version
      operator: eq
      value: "2"

docs: |
  Recording block (flip) — correct eval2/SE-A from 4.5 to 1.0 (version 1 → 2).
  New final: 5.5×0.4 + 1.0×0.3 + 5.0×0.3 = 2.2 + 0.3 + 1.5 = 4.0 → exactly 4.0 → passed.
  Exact boundary check: 4.0 is the inclusive pass threshold.
  Mirrors: TestGradesOutcome_ExactBoundary4.
