info:
  name: 29 Scheme CreateEvaluationScheme Course1
  type: http
  seq: 29

http:
  method: POST
  url: "{{host}}/grades.v1.GradesService/CreateEvaluationScheme"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "courseId": "{{gr_course1_id}}",
        "evaluations": [
          {"weight": "0.400"},
          {"weight": "0.300"},
          {"weight": "0.300"}
        ]
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.evaluations && body.evaluations.length === 3) {
          bru.setVar("gr_eval1_id", body.evaluations[0].id);
          bru.setVar("gr_eval2_id", body.evaluations[1].id);
          bru.setVar("gr_eval3_id", body.evaluations[2].id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.evaluations.length
      operator: eq
      value: "3"

docs: |
  Scheme block — creates a 3-evaluation scheme for course1 (weights 0.4/0.3/0.3 summing to 1.0).
  Captures gr_eval1_id / gr_eval2_id / gr_eval3_id for downstream grade recording.
  Mirrors: TestGradesScheme_CreateHappyPath (AS-1).
