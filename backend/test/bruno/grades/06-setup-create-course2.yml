info:
  name: 06 Setup Create Course2
  type: http
  seq: 6

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/CreateCourse"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "code": "{{gr_course2_code}}",
        "name": "Grades Test Course 2",
        "credits": 3
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("gr_course2_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.id
      operator: neq
      value: ""

docs: |
  Grades setup — creates course2, used for single-eval scheme tests and permission-denied
  scenario (teacher has no section on course2 until explicitly assigned).
  Captures gr_course2_id.
