info:
  name: 25 Setup Teacher Login
  type: http
  seq: 25

http:
  method: POST
  url: "{{host}}/auth.v1.AuthService/Login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{teacher_email}}",
        "password": "TeacherGRSmoke123!"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const sc = res.headers["set-cookie"];
        const raw = Array.isArray(sc) ? sc.join(";") : String(sc || "");
        const m = raw.match(/sid=([^;]+)/);
        if (m) { bru.setVar("teacher_sid", m[1]); }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Teacher login_with_reset — step 3: login, captures teacher_sid.
