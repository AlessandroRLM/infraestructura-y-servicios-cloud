info:
  name: 54 Recreate Course2 Scheme No Grades Succeeds
  type: http
  seq: 54

http:
  method: POST
  url: "{{host}}/grades.v1.GradesService/RecreateEvaluationScheme"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "courseId": "{{gr_course2_id}}",
        "evaluations": [
          {"weight": "0.500"},
          {"weight": "0.500"}
        ]
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.evaluations.length
      operator: eq
      value: "2"

docs: |
  Recreate block — course2 has no grades recorded against its original single-eval scheme,
  so RecreateEvaluationScheme with 2 evaluations (0.5/0.5) succeeds.
  Old single-eval is soft-deleted; new 2-eval scheme is returned.
  Mirrors: TestGradesScheme_RecreateHappyPath.
