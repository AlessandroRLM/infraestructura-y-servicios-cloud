info:
  name: 10 Setup Assign Admin As Teacher
  type: http
  seq: 10

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/AssignTeacherToSection"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "sectionId": "{{grades_section_id}}",
        "teacherId": "a0000000-0000-0000-0000-000000000001"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Grades setup — assigns the bootstrap admin user as teacher for the test section.
  admin id is the fixed bootstrap value a0000000-0000-0000-0000-000000000001.
  RecordGrade requires section_teachers membership in addition to grades.write;
  OverrideGrade (grades.override) bypasses the section_teachers check, so this
  assignment is included for completeness and RecordGrade-denial test accuracy.
