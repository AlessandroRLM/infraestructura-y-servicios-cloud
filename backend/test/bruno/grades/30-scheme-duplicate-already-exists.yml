info:
  name: 30 Scheme Duplicate Already Exists
  type: http
  seq: 30

http:
  method: POST
  url: "{{host}}/grades.v1.GradesService/CreateEvaluationScheme"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "courseId": "{{gr_course1_id}}",
        "evaluations": [
          {"weight": "1.000"}
        ]
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.body.code
      operator: eq
      value: "already_exists"

docs: |
  Scheme block — creating a second scheme for course1 while the first is live → already_exists.
  Mirrors: TestGradesScheme_DuplicateScheme (AS-3).
