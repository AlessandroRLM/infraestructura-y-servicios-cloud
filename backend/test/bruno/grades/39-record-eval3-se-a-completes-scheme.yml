info:
  name: 39 Record Grade Eval3 SE-A 5.0 Completes Scheme
  type: http
  seq: 39

http:
  method: POST
  url: "{{host}}/grades.v1.GradesService/RecordGrade"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{teacher_sid}}"
  body:
    type: json
    data: |-
      {
        "evaluationId": "{{gr_eval3_id}}",
        "sectionEnrollmentId": "{{gr_se_a_id}}",
        "value": "5.0"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.grade) {
          bru.setVar("gr_grade3_id", body.grade.id);
        }
    - type: tests
      code: |-
        test("grade value is the exact decimal string", function() {
          expect(res.body.grade.value).to.equal("5.0");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.grade.version
      operator: eq
      value: "1"

docs: |
  Recording block — teacher records eval3 for SE-A: value=5.0. All 3 evaluations now graded.
  Final grade computation: 5.5×0.4 + 4.5×0.3 + 5.0×0.3 = 2.2 + 1.35 + 1.5 = 5.05
  → rounds half-up to 1 decimal = 5.1 → status: passed.
  Captures gr_grade3_id.
