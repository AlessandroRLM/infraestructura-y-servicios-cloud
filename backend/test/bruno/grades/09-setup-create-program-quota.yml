info:
  name: 09 Setup Create Program Quota
  type: http
  seq: 9

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/CreateProgramQuota"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "programId": "{{gr_prog_id}}",
        "year": 2026,
        "admissionQuota": 50
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Grades setup — program quota for enrollment year 2026 (required for CreateEnrollment).
