info:
  name: 12 Setup Upsert Teacher Profile
  type: http
  seq: 12

http:
  method: POST
  url: "{{host}}/profiles.v1.ProfileService/UpsertTeacherProfile"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "userId": "{{teacher_id}}",
        "department": "Computer Science",
        "title": "Professor"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Grades setup — upserts teacher profile for the smoke teacher user.
  teacher_id is seeded by seed.sh (BRUNO_TEACHER_ID env var).
  Mirrors: gradesSeedTeacherWithSession → seedTeacherProfile pattern.
