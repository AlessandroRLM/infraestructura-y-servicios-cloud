info:
  name: 15 Setup Upsert Student Profile B
  type: http
  seq: 15

http:
  method: POST
  url: "{{host}}/profiles.v1.ProfileService/UpsertStudentProfile"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "userId": "{{student_b_id}}",
        "admissionYear": 2026
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Grades setup — upserts student profile for student B (admissionYear=2026).
  student_b_id is seeded by seed.sh (BRUNO_STUDENT_B_ID env var).
