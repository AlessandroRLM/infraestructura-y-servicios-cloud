info:
  name: 35 Record Grade Eval1 SE-A Correction To 5.5
  type: http
  seq: 35

http:
  method: POST
  url: "{{host}}/grades.v1.GradesService/RecordGrade"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{teacher_sid}}"
  body:
    type: json
    data: |-
      {
        "evaluationId": "{{gr_eval1_id}}",
        "sectionEnrollmentId": "{{gr_se_a_id}}",
        "value": "5.5",
        "expectedVersion": 1
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: tests
      code: |-
        test("grade value is the exact decimal string", function() {
          expect(res.body.grade.value).to.equal("5.5");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.grade.version
      operator: eq
      value: "2"

docs: |
  Recording block — teacher corrects eval1/SE-A from 5.0 to 5.5 with expectedVersion=1
  → version bumps to 2.
  Mirrors: TestGradesRecord_Correction (AS-6).
