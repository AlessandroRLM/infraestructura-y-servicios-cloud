info:
  name: 38 Record Grade Eval2 SE-A 4.5
  type: http
  seq: 38

http:
  method: POST
  url: "{{host}}/grades.v1.GradesService/RecordGrade"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{teacher_sid}}"
  body:
    type: json
    data: |-
      {
        "evaluationId": "{{gr_eval2_id}}",
        "sectionEnrollmentId": "{{gr_se_a_id}}",
        "value": "4.5"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.grade) {
          bru.setVar("gr_grade2_id", body.grade.id);
        }
    - type: tests
      code: |-
        test("grade value is the exact decimal string", function() {
          expect(res.body.grade.value).to.equal("4.5");
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.grade.version
      operator: eq
      value: "1"

docs: |
  Recording block — teacher records eval2 for SE-A: value=4.5, first insert → version=1.
  Captures gr_grade2_id for subsequent correction.
  After this step: 2 of 3 evaluations graded → SE-A still in_progress.
