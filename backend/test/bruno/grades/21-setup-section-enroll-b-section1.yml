info:
  name: 21 Setup Admin EnrollSection B Into Section1
  type: http
  seq: 21

http:
  method: POST
  url: "{{host}}/section_enrollment.v1.SectionEnrollmentService/EnrollSection"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "enrollmentId": "{{gr_enroll_b_id}}",
        "sectionId": "{{gr_section1_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("gr_se_b_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.status
      operator: eq
      value: "in_progress"

docs: |
  Grades setup — admin enrolls student B into section1.
  Captures gr_se_b_id (used for partial-grading / in_progress assertion).
