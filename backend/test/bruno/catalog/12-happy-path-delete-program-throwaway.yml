info:
  name: 12 Happy Path Delete Program Throwaway
  type: http
  seq: 12

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/DeleteProgram"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "id": "{{cat_prog2_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Happy path: DeleteProgram — soft-deletes the throwaway program.
  cat_prog_id (main program) is preserved for all downstream tests.
