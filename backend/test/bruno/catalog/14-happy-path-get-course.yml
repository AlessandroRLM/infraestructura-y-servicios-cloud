info:
  name: 14 Happy Path Get Course
  type: http
  seq: 14

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/GetCourse"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "id": "{{cat_course_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.id
      operator: eq
      value: "{{cat_course_id}}"
    - expression: res.body.credits
      operator: eq
      value: "4"

docs: |
  Happy path: GetCourse — retrieves the created course by id.
