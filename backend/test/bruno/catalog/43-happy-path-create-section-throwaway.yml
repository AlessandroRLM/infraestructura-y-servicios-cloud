info:
  name: 43 Happy Path Create Section Throwaway
  type: http
  seq: 43

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/CreateSection"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "courseId": "{{cat_course_id}}",
        "academicPeriodId": "{{cat_period_id}}",
        "seatCapacity": 5
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("cat_section2_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.id
      operator: neq
      value: ""

docs: |
  Happy path: CreateSection (throwaway) — creates a second section with no teacher assigned,
  so that DeleteSection succeeds (no section_teachers dependents).
