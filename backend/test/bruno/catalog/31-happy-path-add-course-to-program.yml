info:
  name: 31 Happy Path Add Course To Program
  type: http
  seq: 31

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/AddCourseToProgram"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "programId": "{{cat_prog_id}}",
        "courseId": "{{cat_course_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.programId
      operator: eq
      value: "{{cat_prog_id}}"
    - expression: res.body.courseId
      operator: eq
      value: "{{cat_course_id}}"

docs: |
  Happy path: AddCourseToProgram — associates the main course with the main program.
  Returns ProgramCourse with programId, courseId, createdAt.
