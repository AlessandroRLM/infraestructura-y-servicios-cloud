info:
  name: 10 Happy Path List Programs
  type: http
  seq: 10

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/ListPrograms"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {}

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.programs
      operator: isArray
      value: ""
    - expression: res.body.programs.some(p => p.id === bru.getVar("cat_prog_id"))
      operator: eq
      value: "true"

docs: |
  Happy path: ListPrograms — verifies the created program appears in the list.
  Uses a script to check membership and asserts the captured boolean.
