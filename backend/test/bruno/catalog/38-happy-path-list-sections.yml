info:
  name: 38 Happy Path List Sections
  type: http
  seq: 38

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/ListSections"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "courseId": "{{cat_course_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.sections
      operator: isArray
      value: ""
    - expression: res.body.sections.some(s => s.id === bru.getVar("cat_section_id"))
      operator: eq
      value: "true"

docs: |
  Happy path: ListSections — filters by courseId, verifies the created section appears.
