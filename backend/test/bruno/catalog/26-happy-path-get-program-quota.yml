info:
  name: 26 Happy Path Get Program Quota
  type: http
  seq: 26

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/GetProgramQuota"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "id": "{{cat_quota_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.id
      operator: eq
      value: "{{cat_quota_id}}"
    - expression: res.body.year
      operator: eq
      value: "2030"

docs: |
  Happy path: GetProgramQuota — retrieves the created quota by id.
