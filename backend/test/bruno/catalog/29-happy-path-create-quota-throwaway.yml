info:
  name: 29 Happy Path Create Quota Throwaway
  type: http
  seq: 29

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/CreateProgramQuota"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "programId": "{{cat_prog_id}}",
        "year": 2029,
        "admissionQuota": 10
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("cat_quota2_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.id
      operator: neq
      value: ""

docs: |
  Happy path: CreateProgramQuota (throwaway) — creates a second quota (year=2029) to delete next.
