info:
  name: 01 Setup Admin Login
  type: http
  seq: 1

http:
  method: POST
  url: "{{host}}/auth.v1.AuthService/Login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{admin_email}}",
        "password": "{{admin_password}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: before-request
      code: |-
        // Seed a run-scoped entity_id so repeated runs do not collide on unique constraints.
        const sfx = String(Date.now()).slice(-8);
        bru.setVar("audit_entity_id", `00000000-0000-0000-0000-${sfx.padStart(12, "0")}`);
        console.log(`[audit-setup] entity_id=${bru.getVar("audit_entity_id")}`);
    - type: after-response
      code: |-
        const sc = res.headers["set-cookie"];
        const raw = Array.isArray(sc) ? sc.join(";") : String(sc || "");
        const m = raw.match(/sid=([^;]+)/);
        if (m) { bru.setVar("admin_sid", m[1]); }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Audit logs setup: admin login. Captures admin_sid and seeds audit_entity_id.
  The admin role holds audit.read permission.
