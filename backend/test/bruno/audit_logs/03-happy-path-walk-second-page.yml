info:
  name: 03 Happy Path Walk Second Page
  type: http
  seq: 3

http:
  method: POST
  url: "{{host}}/audit_logs.v1.AuditLogsService/ListAuditLogs"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "entity": "grades",
        "entityId": "{{audit_entity_id}}",
        "pageSize": 20,
        "pageToken": "{{audit_page_token}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: (res.body.nextPageToken ?? '') === ''
      operator: eq
      value: "true"

docs: |
  Happy path: walks the second page using the token from step 02.
  Since there are no seeded rows, audit_page_token is empty and this request
  re-queries the last page. Asserts: HTTP 200 and empty next_page_token.
  The protojson empty-field guard '(res.body.nextPageToken ?? '') === ""' handles
  the case where the field is omitted entirely from the response.
