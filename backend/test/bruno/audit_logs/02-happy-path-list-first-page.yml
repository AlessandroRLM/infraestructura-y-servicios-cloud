info:
  name: 02 Happy Path List First Page
  type: http
  seq: 2

http:
  method: POST
  url: "{{host}}/audit_logs.v1.AuditLogsService/ListAuditLogs"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "entity": "grades",
        "entityId": "{{audit_entity_id}}",
        "pageSize": 20
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        // Capture next_page_token for chained walk test.
        // protojson omits empty scalar fields — use nullish coalescing.
        bru.setVar("audit_page_token", (res.body.nextPageToken ?? ""));
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Happy path: admin lists the first page of audit logs for grades/audit_entity_id.
  The entity_id has no seeded rows (Bruno does not run migrations), so the response
  is an empty list — this is correct behaviour (CodeNotFound is NOT expected).
  Captures next_page_token (empty on last/only page) for step 03.
