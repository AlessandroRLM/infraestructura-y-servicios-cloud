info:
  name: 21 Happy Path List Audit Logs
  type: http
  seq: 21

http:
  method: POST
  url: "{{host}}/audit_logs.v1.AuditLogsService/ListAuditLogs"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{audit_admin_sid}}"
  body:
    type: json
    data: |-
      {
        "entity": "grades",
        "entityId": "{{audit_grade_id}}",
        "pageSize": 20
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        // Capture next_page_token for chained pagination test.
        // protojson omits empty scalar fields — use nullish coalescing.
        bru.setVar("audit_page_token", (res.body.nextPageToken ?? ""));
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: Array.isArray(res.body.logs) && res.body.logs.length >= 1
      operator: eq
      value: "true"
    - expression: res.body.logs[0].id
      operator: neq
      value: ""
    - expression: res.body.logs[0].action
      operator: neq
      value: ""
    - expression: res.body.logs[0].entity
      operator: neq
      value: ""
    - expression: res.body.logs[0].entityId
      operator: neq
      value: ""
    - expression: res.body.logs[0].createdAt
      operator: neq
      value: ""
    - expression: res.body.logs[0].actorId === 'a0000000-0000-0000-0000-000000000001'
      operator: eq
      value: "true"
    - expression: res.body.logs[0].detail.includes('"old_value"')
      operator: eq
      value: "true"
    - expression: res.body.logs[0].detail.includes('"new_value"')
      operator: eq
      value: "true"
    - expression: res.body.logs[0].detail.includes('5.0')
      operator: eq
      value: "true"
    - expression: res.body.logs[0].detail.includes('6.5')
      operator: eq
      value: "true"

docs: |
  Happy path: admin lists audit logs for entity="grades", entity_id=audit_grade_id.
  The grade correction in step 20 wrote exactly one audit_logs row with:
    action="grade.update", entity="grades", actor_id=admin UUID,
    detail={"old_value":"5.0","new_value":"6.5"}.
  Asserts:
    - HTTP 200
    - logs array has >= 1 entry
    - First row has id, action, entity, entityId, createdAt present
    - actorId equals the bootstrap admin UUID
    - detail (raw JSON string) contains "old_value", "new_value", "5.0", "6.5"
  Captures audit_page_token for pagination contract check in step 22.
