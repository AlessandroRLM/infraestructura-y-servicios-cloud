info:
  name: 23 Denial No Session
  type: http
  seq: 23

http:
  method: POST
  url: "{{host}}/audit_logs.v1.AuditLogsService/ListAuditLogs"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "entity": "grades",
        "entityId": "{{audit_grade_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.body.code
      operator: eq
      value: "unauthenticated"

docs: |
  Denial: no session cookie → auth interceptor rejects with unauthenticated.
  No Cookie header is sent. The auth interceptor short-circuits before the authz check.
