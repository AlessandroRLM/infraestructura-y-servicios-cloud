info:
  name: 05 Setup Student Login
  type: http
  seq: 5

http:
  method: POST
  url: "{{host}}/auth.v1.AuthService/Login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{student_a_email}}",
        "password": "StudentSmoke123!"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const sc = res.headers["set-cookie"];
        const raw = Array.isArray(sc) ? sc.join(";") : String(sc || "");
        const m = raw.match(/sid=([^;]+)/);
        if (m) { bru.setVar("student_a_sid", m[1]); }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Setup: student A login. Captures student_a_sid for step 06.
  student_a_email and the password are provided by seed.sh (--env-var student_a_email=...).
  Students hold grades.view_own only — they do NOT hold audit.read.
