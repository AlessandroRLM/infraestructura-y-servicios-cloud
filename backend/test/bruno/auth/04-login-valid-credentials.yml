info:
  name: 04 Login Valid Credentials
  type: http
  seq: 4

http:
  method: POST
  url: "{{host}}/auth.v1.AuthService/Login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{admin_email}}",
        "password": "{{admin_password}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Login table case: valid credentials -> OK.
  Replaces: login_cases.json row "valid credentials" in run_auth_flow.sh.
