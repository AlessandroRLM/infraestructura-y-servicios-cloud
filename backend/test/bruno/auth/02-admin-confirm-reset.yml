info:
  name: 02 Admin Confirm Password Reset
  type: http
  seq: 2

http:
  method: POST
  url: "{{host}}/auth.v1.AuthService/ConfirmPasswordReset"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "token": "{{admin_reset_token}}",
        "newPassword": "{{admin_password}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Step 2 of the login_with_reset flow for admin: sets a known password using the dev reset token.
  Replaces: grpc auth ConfirmPasswordReset in run_section_enrollment_flow.sh (admin login setup).
