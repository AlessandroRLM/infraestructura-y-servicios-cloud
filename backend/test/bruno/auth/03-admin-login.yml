info:
  name: 03 Admin Login
  type: http
  seq: 3

http:
  method: POST
  url: "{{host}}/auth.v1.AuthService/Login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{admin_email}}",
        "password": "{{admin_password}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        // Extract the sid cookie value from the Set-Cookie response header.
        // The server sets: Set-Cookie: sid=<value>; Path=/; HttpOnly; SameSite=Lax
        const sc = res.headers["set-cookie"];
        const raw = Array.isArray(sc) ? sc.join(";") : String(sc || "");
        const m = raw.match(/sid=([^;]+)/);
        if (m) { bru.setVar("admin_sid", m[1]); }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Step 3 of the login_with_reset flow for admin: issues a session.
  Captures the sid cookie into collection var admin_sid.
  Replaces: grpcurl -v Login + grep sid= in run_section_enrollment_flow.sh.
  Bash check: "login admin (enrollment.manage + catalog.manage + users.manage)"
