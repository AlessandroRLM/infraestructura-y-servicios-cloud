info:
  name: 05 Login Wrong Password
  type: http
  seq: 5

http:
  method: POST
  url: "{{host}}/auth.v1.AuthService/Login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{admin_email}}",
        "password": "definitely-not-the-password"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.body.code
      operator: eq
      value: "unauthenticated"

docs: |
  Login table case: wrong password -> unauthenticated.
  Replaces: login_cases.json row "wrong password" in run_auth_flow.sh.
