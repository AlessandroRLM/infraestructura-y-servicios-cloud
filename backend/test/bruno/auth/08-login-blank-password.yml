info:
  name: 08 Login Blank Password
  type: http
  seq: 8

http:
  method: POST
  url: "{{host}}/auth.v1.AuthService/Login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{admin_email}}",
        "password": ""
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.body.code
      operator: eq
      value: "invalid_argument"

docs: |
  Login table case: blank password -> invalid_argument.
  Replaces: login_cases.json row "blank password" in run_auth_flow.sh.
