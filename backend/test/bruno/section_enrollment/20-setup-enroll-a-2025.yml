info:
  name: 20 Setup Create Enrollment Student A Year 2025
  type: http
  seq: 20

http:
  method: POST
  url: "{{host}}/enrollment.v1.EnrollmentService/CreateEnrollment"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "studentId": "{{student_a_id}}",
        "programId": "{{prog_id}}",
        "year": 2025
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("enroll_a_2025_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Enrollment setup — creates year=2025 enrollment for student A.
  Used for the "year mismatch" test (section is in 2026 period, enrollment is year=2025).
  Replaces: grpc enr CreateEnrollment student A year=2025 in run_section_enrollment_flow.sh.
  Bash check: "CreateEnrollment student A year=2025 (for mismatch test)"
