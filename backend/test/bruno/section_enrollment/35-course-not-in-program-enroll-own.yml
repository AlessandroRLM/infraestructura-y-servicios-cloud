info:
  name: 35 Course Not In Program EnrollOwnSection
  type: http
  seq: 35

http:
  method: POST
  url: "{{host}}/section_enrollment.v1.SectionEnrollmentService/EnrollOwnSection"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{student_a_sid}}"
  body:
    type: json
    data: |-
      {
        "sectionId": "{{section_id}}",
        "programId": "{{other_prog_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.body.code
      operator: eq
      value: "failed_precondition"

docs: |
  Course not in program: student A uses a program_id that doesn't contain the section's course.
  Should return failed_precondition.
  Replaces: grpc se EnrollOwnSection course not in program in run_section_enrollment_flow.sh.
  Bash check: "EnrollOwnSection course not in program (-> FailedPrecondition)"
