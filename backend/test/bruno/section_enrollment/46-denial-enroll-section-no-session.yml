info:
  name: 46 Denial EnrollSection No Session
  type: http
  seq: 46

http:
  method: POST
  url: "{{host}}/section_enrollment.v1.SectionEnrollmentService/EnrollSection"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "enrollmentId": "{{enroll_a_id}}",
        "sectionId": "{{section_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.body.code
      operator: eq
      value: "unauthenticated"

docs: |
  Denial: EnrollSection without a session cookie -> unauthenticated.
  Replaces: grpc se EnrollSection (no cookie) in run_section_enrollment_flow.sh.
  Bash check: "EnrollSection without session (-> Unauthenticated)"
