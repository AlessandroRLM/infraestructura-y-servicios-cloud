info:
  name: 26 Setup Student C Confirm Reset
  type: http
  seq: 26

http:
  method: POST
  url: "{{host}}/auth.v1.AuthService/ConfirmPasswordReset"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "token": "{{student_c_reset_token}}",
        "newPassword": "StudentCSmoke123!"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Student C login_with_reset — step 2: confirm password reset.
