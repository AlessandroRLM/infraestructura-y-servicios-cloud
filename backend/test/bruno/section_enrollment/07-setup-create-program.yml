info:
  name: 07 Setup Create Program
  type: http
  seq: 7

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/CreateProgram"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "code": "{{prog_code}}",
        "name": "SE Test Program"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("prog_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.id
      operator: neq
      value: ""

docs: |
  Catalog setup — creates the main program for the smoke flow.
  Captures prog_id for subsequent requests.
  Replaces: grpc cat CreateProgram (SEPROG-$SFX) in run_section_enrollment_flow.sh.
  Bash check: "CreateProgram"
