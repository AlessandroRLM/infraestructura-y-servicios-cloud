info:
  name: 14 Setup Create Other Program
  type: http
  seq: 14

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/CreateProgram"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "code": "{{other_prog_code}}",
        "name": "SE Other Program"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("other_prog_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.id
      operator: neq
      value: ""

docs: |
  Catalog setup — creates a second program NOT linked to the test course.
  Used for the "course not in program" rejection test.
  Replaces: grpc cat CreateProgram (other, course not added) in run_section_enrollment_flow.sh.
  Bash check: "CreateProgram (other, course not added)"
