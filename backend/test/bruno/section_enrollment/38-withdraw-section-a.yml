info:
  name: 38 Withdraw Section Student A
  type: http
  seq: 38

http:
  method: POST
  url: "{{host}}/section_enrollment.v1.SectionEnrollmentService/WithdrawSection"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "id": "{{se_a_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Withdraw (admin-only): admin withdraws student A's in_progress inscription.
  This frees one seat (capacity goes back to 1/2) and leaves the inscription in withdrawn state.
  Replaces: grpc se WithdrawSection student A in run_section_enrollment_flow.sh.
  Bash check: "WithdrawSection student A -> withdrawn"
