info:
  name: 45 Self-Scope ListOwnSectionEnrollments
  type: http
  seq: 45

http:
  method: POST
  url: "{{host}}/section_enrollment.v1.SectionEnrollmentService/ListOwnSectionEnrollments"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{student_a_sid}}"
  body:
    type: json
    data: |-
      {}

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        // Verify the list is non-empty (student A has at least one in_progress inscription).
        const body = res.body;
        const enrollments = (body && body.sectionEnrollments) ? body.sectionEnrollments : [];
        bru.setVar("list_own_se_count", enrollments.length);
    - type: tests
      code: |-
        test("returns non-empty list", function() {
          const count = parseInt(bru.getVar("list_own_se_count") || "0");
          expect(count).to.be.at.least(1);
        });
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Self-scope: student A lists their own section enrollments. Must return at least one record.
  The bash script checked .sectionEnrollments | length > 0 via jq on the grpcurl response.
  Replaces: grpc se ListOwnSectionEnrollments + jq non-empty check in run_section_enrollment_flow.sh.
  Bash checks: "ListOwnSectionEnrollments student A", "ListOwnSectionEnrollments returns non-empty list"
