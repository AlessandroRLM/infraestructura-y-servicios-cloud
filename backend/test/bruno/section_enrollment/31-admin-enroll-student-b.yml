info:
  name: 31 Admin EnrollSection Student B
  type: http
  seq: 31

http:
  method: POST
  url: "{{host}}/section_enrollment.v1.SectionEnrollmentService/EnrollSection"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "enrollmentId": "{{enroll_b_id}}",
        "sectionId": "{{section_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("se_b_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Admin enroll: admin enrolls student B via enrollment_id. Section is now at capacity (2/2).
  Captures se_b_id for use in denial tests (withdraw without touching A's slot).
  Replaces: grpc se EnrollSection (admin, enrollment_id) in run_section_enrollment_flow.sh.
  Bash check: "EnrollSection admin enroll student B -> in_progress"
