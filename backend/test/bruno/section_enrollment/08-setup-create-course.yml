info:
  name: 08 Setup Create Course
  type: http
  seq: 8

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/CreateCourse"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "code": "{{course_code}}",
        "name": "SE Test Course",
        "credits": 4
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("course_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.id
      operator: neq
      value: ""

docs: |
  Catalog setup — creates the test course.
  Captures course_id.
  Replaces: grpc cat CreateCourse (SECRS-$SFX) in run_section_enrollment_flow.sh.
  Bash check: "CreateCourse"
