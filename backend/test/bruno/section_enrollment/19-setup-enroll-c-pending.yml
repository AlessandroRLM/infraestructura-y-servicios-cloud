info:
  name: 19 Setup Create Enrollment Student C Pending
  type: http
  seq: 19

http:
  method: POST
  url: "{{host}}/enrollment.v1.EnrollmentService/CreateEnrollment"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "studentId": "{{student_c_id}}",
        "programId": "{{prog_id}}",
        "year": 2026
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("enroll_c_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Enrollment setup — creates a PENDING enrollment for student C. Intentionally NOT paid.
  Used for the "not paid -> FailedPrecondition" test case.
  Replaces: grpc enr CreateEnrollment student C in run_section_enrollment_flow.sh.
  Bash check: "CreateEnrollment student C -> pending (intentionally not paid)"
