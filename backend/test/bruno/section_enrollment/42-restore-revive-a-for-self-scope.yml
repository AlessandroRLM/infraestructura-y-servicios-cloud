info:
  name: 42 Restore Revive A For Self-Scope Tests
  type: http
  seq: 42

http:
  method: POST
  url: "{{host}}/section_enrollment.v1.SectionEnrollmentService/EnrollSection"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "enrollmentId": "{{enroll_a_id}}",
        "sectionId": "{{section_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("se_a_final_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Restore: admin re-enrolls student A so there is a live in_progress inscription for
  the self-scope tests.
  Captures se_a_final_id.
  Replaces: grpc se EnrollSection revive student A (restore for self-scope test) in run_section_enrollment_flow.sh.
  Bash check: "EnrollSection revive student A (restore for self-scope test)"
