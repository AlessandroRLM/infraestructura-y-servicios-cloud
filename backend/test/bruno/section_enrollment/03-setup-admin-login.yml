info:
  name: 03 Setup Admin Login
  type: http
  seq: 3

http:
  method: POST
  url: "{{host}}/auth.v1.AuthService/Login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{admin_email}}",
        "password": "{{admin_password}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const sc = res.headers["set-cookie"];
        const raw = Array.isArray(sc) ? sc.join(";") : String(sc || "");
        const m = raw.match(/sid=([^;]+)/);
        if (m) { bru.setVar("admin_sid", m[1]); }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Section enrollment setup — step 3: admin login, captures admin_sid.
  Replaces: login_with_reset "$ADMIN_EMAIL" + sid capture in run_section_enrollment_flow.sh.
  Bash check: "login admin (enrollment.manage + catalog.manage + users.manage)"
