info:
  name: 56 Denial Student EnrollSection Management RPC
  type: http
  seq: 56

http:
  method: POST
  url: "{{host}}/section_enrollment.v1.SectionEnrollmentService/EnrollSection"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{student_a_sid}}"
  body:
    type: json
    data: |-
      {
        "enrollmentId": "{{enroll_a_id}}",
        "sectionId": "{{section_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.body.code
      operator: eq
      value: "permission_denied"

docs: |
  Denial: a student tries to call the admin-only EnrollSection RPC -> permission_denied.
  Students have sections.enroll but NOT enrollment.manage; EnrollSection requires enrollment.manage.
  Replaces: grpc se EnrollSection (student A) in run_section_enrollment_flow.sh.
  Bash check: "student EnrollSection (management RPC) (-> PermissionDenied)"
