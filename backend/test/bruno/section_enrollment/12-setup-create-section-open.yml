info:
  name: 12 Setup Create Section Open Window
  type: http
  seq: 12

http:
  method: POST
  url: "{{host}}/catalog.v1.CatalogService/CreateSection"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "courseId": "{{course_id}}",
        "academicPeriodId": "{{open_period_id}}",
        "seatCapacity": 2
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.body;
        if (body && body.id) {
          bru.setVar("section_id", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "200"
    - expression: res.body.id
      operator: neq
      value: ""

docs: |
  Catalog setup — creates the main section with capacity=2 against the open-window period.
  open_period_id must be set by seed.sh (psql INSERT into academic_periods with an open
  enrollment window: enrollment_starts_at = now()-1h, enrollment_ends_at = now()+1h).
  Replaces: grpc cat CreateSection (capacity=2, open window) in run_section_enrollment_flow.sh.
  Bash check: "CreateSection (capacity=2, open window)"
