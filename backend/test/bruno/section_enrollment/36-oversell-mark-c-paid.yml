info:
  name: 36 Oversell Setup Mark C Paid
  type: http
  seq: 36

http:
  method: POST
  url: "{{host}}/enrollment.v1.EnrollmentService/MarkEnrollmentPaid"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "id": "{{enroll_c_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Oversell setup: marks student C's enrollment as paid so that the capacity check
  (not the payment check) is the limiting factor in the next request.
  Replaces: grpc enr MarkEnrollmentPaid student C -> paid (for oversell test) in run_section_enrollment_flow.sh.
  Bash check: "MarkEnrollmentPaid student C -> paid (for oversell test)"
