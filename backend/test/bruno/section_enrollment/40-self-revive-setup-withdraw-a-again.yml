info:
  name: 40 Self-Revive Setup Withdraw A Again
  type: http
  seq: 40

http:
  method: POST
  url: "{{host}}/section_enrollment.v1.SectionEnrollmentService/WithdrawSection"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{admin_sid}}"
  body:
    type: json
    data: |-
      {
        "id": "{{se_a_revived_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.status
      operator: eq
      value: "200"

docs: |
  Self-revive setup: admin withdraws student A's inscription again, putting the
  (enrollment_A, section) key back into withdrawn state so the next request can test
  that a student cannot self-revive their own withdrawn inscription.
  Replaces: grpc se WithdrawSection student A again (setup for self-revive test) in run_section_enrollment_flow.sh.
  Bash check: "WithdrawSection student A again (setup for self-revive test)"
