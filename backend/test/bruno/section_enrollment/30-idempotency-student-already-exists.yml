info:
  name: 30 Idempotency EnrollOwnSection Student Already Exists
  type: http
  seq: 30

http:
  method: POST
  url: "{{host}}/section_enrollment.v1.SectionEnrollmentService/EnrollOwnSection"
  headers:
    - name: Content-Type
      value: application/json
    - name: Cookie
      value: "sid={{student_a_sid}}"
  body:
    type: json
    data: |-
      {
        "sectionId": "{{section_id}}",
        "programId": "{{prog_id}}"
      }

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  assertions:
    - expression: res.body.code
      operator: eq
      value: "already_exists"

docs: |
  Idempotency/duplicate: student A tries to self-enroll into a section where they are already in_progress.
  Replaces: grpc se EnrollOwnSection duplicate in_progress (student) in run_section_enrollment_flow.sh.
  Bash check: "EnrollOwnSection duplicate in_progress (student) (-> AlreadyExists)"
