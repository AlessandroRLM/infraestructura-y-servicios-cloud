info:
  name: 03 Get Metrics Missing Token
  type: http
  seq: 3

http:
  method: GET
  url: "{{host}}/metrics"
  # No X-Metrics-Token header — request must be denied.

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        test("missing token returns 401 without WWW-Authenticate", function () {
          expect(res.status).to.equal(401);
          expect(res.headers["www-authenticate"] ?? "").to.equal("");
        });

docs: |
  Denial: GET /metrics without the X-Metrics-Token header must return 401.
  Verifies that the endpoint is inaccessible without authentication.
