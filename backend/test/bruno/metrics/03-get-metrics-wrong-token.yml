info:
  name: 03 Get Metrics Wrong Token
  type: http
  seq: 3

http:
  method: GET
  url: "{{host}}/metrics"
  headers:
    - name: X-Metrics-Token
      value: "wrong"

settings:
  encodeUrl: true
  timeout: 5000
  followRedirects: false
  maxRedirects: 0

runtime:
  scripts:
    - type: after-response
      code: |-
        expect(res.status).to.equal(401);

docs: |
  Denial: GET /metrics with an incorrect X-Metrics-Token value must return 401.
  Verifies constant-time comparison rejects mismatched tokens.
