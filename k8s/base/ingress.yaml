apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: academico
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  ingressClassName: nginx
  rules:
    - host: academico.local
      http:
        paths:
          # Connect RPC: paths matching service package pattern (must be listed FIRST)
          - path: /[a-zA-Z0-9_]+\.v1\..*
            pathType: ImplementationSpecific
            backend:
              service:
                name: api
                port:
                  number: 8080
          # SPA y assets estáticos
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
