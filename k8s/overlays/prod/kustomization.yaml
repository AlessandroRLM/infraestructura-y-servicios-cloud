apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: academico-prod

resources:
  - namespace.yaml
  - resourcequota.yaml
  - ../../base

# No secretGenerator: in production `app-secrets` is provisioned out-of-band
# (External Secrets Operator / GCP Secret Manager). See README.md.

images:
  - name: academico/api
    newTag: "1.0.0"
  - name: academico/web
    newTag: "1.0.0"

components:
  - ../../components/gmp

patches:
  - path: patch-ingress-prod.yaml
    target:
      kind: Ingress
      name: academico
  - path: patch-postgres-storage.yaml
    target:
      kind: StatefulSet
      name: postgres
