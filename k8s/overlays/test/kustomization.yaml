apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: academico-test

resources:
  - namespace.yaml
  - resourcequota.yaml
  - ../../base

secretGenerator:
  - name: app-secrets
    envs:
      - .env.test

generatorOptions:
  disableNameSuffixHash: true

components:
  - ../../components/gmp

patches:
  - path: patch-ingress-test.yaml
    target:
      kind: Ingress
      name: academico
